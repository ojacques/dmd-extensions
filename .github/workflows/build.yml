name: Build and Package

on: [push]

permissions:
  contents: write

jobs:
  
  # Build artifacts
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # We need dotnet
      - name: Add dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v1

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1
      
      - name: Restore NuGet packages
        run: nuget restore DmdExtensions.sln
        
      - name: Restore DLLExport dependency
        run: .\DllExport -action Restore -sln-file DmdExtensions.sln

      # Build artifacts 
      - name: Build-X86
        run: msbuild /property:Platform=x86 /property:Configuration=Release DmdExtensions.sln

      # Build artifacts 
      - name: Build-X64
        run: msbuild -/property:Platform=x64 /property:Configuration=Release DmdExtensions.sln

      # - name: Publish Release
      #   run: dotnet publish DmdExtensions.sln -f net472 

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: DMDEXT
          #path: bin\Release\net8.0-windows\win-x64\publish
          path: bin\Release
          retention-days: 7

      - name: Generate zip bundle
        run: |
          # tree /f
          7z a -tzip dmdext-x64.zip .\DMD-Extensions\dmd-extensions\Console\bin\x64\Release\*
          7z a -tzip dmdext-x86.zip .\DMD-Extensions\dmd-extensions\Console\bin\x86\Release\*
      
      - if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        name: Publish latest pre-release
        uses: ncipollo/release-action@v1
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          generateReleaseNotes: true
          prerelease: true
          artifacts: |
            dmdext-x64.zip
            dmdext-x86.zip

      - if: startsWith(github.ref, 'refs/tags/')
        name: Publish tagged release
        uses: ncipollo/release-action@v1
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          generateReleaseNotes: true
          prerelease: false
          artifacts: |
            dmdext-x64.zip
            dmdext-x86.zip